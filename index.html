<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnowWasteland 2D</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="hud">
      <div id="top-row">
        <div id="bars"></div>
        <div id="money"></div>
      </div>
      <div id="hotbar"></div>
      <div id="inventory" class="hidden"></div>
      <div id="crafting" class="hidden"></div>
      <div id="map" class="hidden"></div>
      <div id="help">
        <strong>Controls:</strong>
        A/D move • S crouch • E shoot • R reload • F interact • G gather
        • C crafting panel • [/] recipe • V craft • B build mode • T trader • I inventory • M map
      </div>
    </div>
    <canvas id="game" width="1280" height="720"></canvas>
    <script type="module" src="src/game.js"></script>
  </body>
</html>
